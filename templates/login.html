<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 For a Special Friend 💕</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #ffe8e8 0%, #ffd4d4 30%, #ffc8c8 60%, #ffe0e8 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        
        .heart {
            position: absolute;
            font-size: 20px;
            animation: floatUp 15s infinite linear;
            opacity: 0.3;
        }
        
        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg) scale(1);
                opacity: 0.3;
            }
            50% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg) scale(0.5);
                opacity: 0;
            }
        }
        
        .login-container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 
                0 20px 60px rgba(212, 123, 138, 0.15),
                0 0 40px rgba(255, 200, 200, 0.2);
            animation: bounceIn 0.8s ease;
        }
        
        @keyframes bounceIn {
            0% {
                opacity: 0;
                transform: scale(0.8) translateY(30px);
            }
            60% {
                transform: scale(1.02) translateY(-10px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 35px;
        }
        
        .login-header .emoji {
            font-size: 4em;
            display: block;
            margin-bottom: 10px;
            animation: wiggle 3s infinite;
        }
        
        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }
        
        .login-header h1 {
            font-size: 2em;
            font-weight: 700;
            color: #d47b8a;
            margin-bottom: 5px;
        }
        
        .login-header .subtitle {
            color: #b8888a;
            font-size: 1em;
            font-weight: 400;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            color: #c49a9c;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9em;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #f0d4d4;
            border-radius: 20px;
            font-size: 1em;
            font-family: 'Quicksand', sans-serif;
            transition: all 0.3s;
            outline: none;
            background: rgba(255, 255, 255, 0.5);
        }
        
        .form-group input:focus {
            border-color: #d47b8a;
            box-shadow: 0 0 20px rgba(212, 123, 138, 0.1);
        }
        
        .form-group input::placeholder {
            color: #d4b8b8;
        }
        
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #d47b8a, #c06a7a);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1.1em;
            font-weight: 600;
            font-family: 'Quicksand', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 10px 30px rgba(212, 123, 138, 0.3);
        }
        
        .btn-submit:active {
            transform: scale(0.98);
        }
        
        .flash-messages {
            margin-bottom: 20px;
        }
        
        .flash-message {
            padding: 12px 16px;
            border-radius: 15px;
            margin-bottom: 10px;
            font-size: 0.95em;
            text-align: center;
            font-weight: 500;
        }
        
        .flash-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .flash-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .flash-message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .footer-text {
            text-align: center;
            margin-top: 25px;
            color: #d4b8b8;
            font-size: 0.85em;
        }
        
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 25px;
            }
            
            .login-header h1 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <!-- Floating Hearts -->
    <div class="floating-hearts" id="hearts"></div>
    
    <div class="login-container">
        <div class="login-header">
            <span class="emoji">🌸</span>
            <h1>For a Special Friend</h1>
            <p class="subtitle">💕 A place just for you</p>
        </div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}
                        <div class="flash-message {{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label>🔑 Enter the password</label>
                <input type="password" name="password" placeholder="Type password here..." required autofocus>
            </div>
            <button type="submit" class="btn-submit">💖 Enter</button>
        </form>
        
        <p class="footer-text">✨ Made with love for a special friend</p>
    </div>
    
    <script>
        // Create floating hearts
        const heartsContainer = document.getElementById('hearts');
        const heartEmojis = ['💕', '💖', '💗', '💓', '🌸', '🌺', '⭐', '🌈', '✨', '🌷'];
        
        for (let i = 0; i < 20; i++) {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDuration = (12 + Math.random() * 15) + 's';
            heart.style.animationDelay = (Math.random() * 15) + 's';
            heart.style.fontSize = (15 + Math.random() * 25) + 'px';
            heartsContainer.appendChild(heart);
        }
    </script>
</body>
</html>
