<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Oops!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #ffe8e8, #ffd4d4);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            margin: 0;
        }
        .error-box {
            background: rgba(255,255,255,0.8);
            padding: 50px;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(212,123,138,0.15);
        }
        h1 { color: #d47b8a; font-size: 3em; margin: 0; }
        .emoji { font-size: 4em; }
        a { 
            color: #d47b8a; 
            text-decoration: none; 
            font-weight: 600;
            display: inline-block;
            margin-top: 15px;
            padding: 12px 30px;
            background: white;
            border-radius: 25px;
            transition: all 0.3s;
        }
        a:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(212,123,138,0.2);
        }
    </style>
</head>
<body>
    <div class="error-box">
        <div class="emoji">💕</div>
        <h1>500</h1>
        <p style="color: #b8888a;">Something went wrong! Let's try again 🌸</p>
        <a href="/">💖 Go back home</a>
    </div>
</body>
</html>
